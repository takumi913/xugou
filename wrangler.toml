name = "xugou-app"
main = "backend/src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

minify = true # 生产环境压缩代码

# 添加定时触发器，每分钟执行一次监控检查
[triggers]
crons = ["* * * * *"]

[vars]
FREE_MODE = "true"
MIN_AGENT_REPORT_INTERVAL_SECONDS = "300"
MIN_MONITOR_INTERVAL_SECONDS = "300"
MONITOR_CHECK_BATCH_SIZE = "10"
MONITOR_CHECK_CONCURRENCY = "3"
AGENT_OFFLINE_BATCH_SIZE = "50"
STATUS_PAGE_CACHE_TTL_SECONDS = "60"
STATUS_SNAPSHOT_DIRTY_COALESCE_SECONDS = "30"
PUBLIC_METRICS_CACHE_TTL_SECONDS = "120"
AGENT_ROLLUP_RETENTION_DAYS = "30"
MONITOR_ROLLUP_RETENTION_DAYS = "90"
MONITOR_INCIDENT_RETENTION_DAYS = "180"

[[d1_databases]]
binding = "DB"
database_name = "${D1_DATABASE_NAME}" # 使用占位符
database_id = "${D1_DATABASE_ID}" # 使用占位符

[assets]
binding = "ASSETS"
directory = "frontend/dist"
not_found_handling = "single-page-application"

[version_metadata]
binding = "CF_VERSION_METADATA"
